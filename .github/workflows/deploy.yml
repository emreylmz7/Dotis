name: Deploy Dotis

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/Dotis || git clone https://github.com/${{ github.repository }}.git ~/Dotis
            cd ~/Dotis
            git pull origin main
            docker compose up -d --build
            docker compose logs --tail=5 dotis
